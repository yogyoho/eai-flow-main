# =============================================================================
# EAI-Flow 生产离线部署 — RAGFlow 知识库服务栈
# =============================================================================

services:
  # ── RAGFlow (API + Web UI + Task Executor) ─────────────────────────────────
  ragflow:
    image: ${RAGFLOW_IMAGE:-infiniflow/ragflow:v0.25.3}
    container_name: prod-eai-flow-ragflow
    environment:
      - MYSQL_HOST=ragflow-mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=${MYSQL_ROOT_PASSWORD:-ragflow123}
      - MYSQL_DBNAME=${MYSQL_DBNAME:-ragflow}
      - ES_HOST=ragflow-es
      - ES_USER=elastic
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-ragflow123}
      - REDIS_HOST=ragflow-redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-ragflow123}
      - MINIO_HOST=ragflow-minio
      - MINIO_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - prod-ragflow-data:/ragflow
    ports:
      - "${RAGFLOW_PORT:-19380}:9380"
      - "${RAGFLOW_WEB_PORT:-19381}:80"
    depends_on:
      ragflow-mysql:
        condition: service_healthy
      ragflow-es:
        condition: service_healthy
      ragflow-redis:
        condition: service_healthy
      ragflow-minio:
        condition: service_healthy
    networks:
      - prod-eai-flow-net
    restart: unless-stopped

  # ── Elasticsearch ──────────────────────────────────────────────────────────
  ragflow-es:
    image: elasticsearch:8.11.3
    container_name: prod-eai-flow-ragflow-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-ragflow123}
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - prod-ragflow-es-data:/usr/share/elasticsearch/data
    ports:
      - "${ES_PORT:-19200}:9200"
    networks:
      - prod-eai-flow-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u elastic:${ELASTIC_PASSWORD:-ragflow123} http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── MySQL ──────────────────────────────────────────────────────────────────
  ragflow-mysql:
    image: mysql:8.0
    container_name: prod-eai-flow-ragflow-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-ragflow123}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-ragflow}
    volumes:
      - prod-ragflow-mysql-data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-13306}:3306"
    networks:
      - prod-eai-flow-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-ragflow123}"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  # ── Redis ──────────────────────────────────────────────────────────────────
  ragflow-redis:
    image: redis:7-alpine
    container_name: prod-eai-flow-ragflow-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-ragflow123}
    volumes:
      - prod-ragflow-redis-data:/data
    ports:
      - "${REDIS_PORT:-16379}:6379"
    networks:
      - prod-eai-flow-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-ragflow123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO ──────────────────────────────────────────────────────────────────
  ragflow-minio:
    image: minio/minio:latest
    container_name: prod-eai-flow-ragflow-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - prod-ragflow-minio-data:/data
    ports:
      - "${MINIO_API_PORT:-19100}:9000"
      - "${MINIO_CONSOLE_PORT:-19101}:9001"
    networks:
      - prod-eai-flow-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  prod-ragflow-data:
  prod-ragflow-es-data:
  prod-ragflow-mysql-data:
  prod-ragflow-redis-data:
  prod-ragflow-minio-data:

networks:
  prod-eai-flow-net:
    external: true
    name: eai-prod_eai-flow-net
