# RAGFlow Service Stack
# Usage: docker compose -f docker-compose.yaml -f docker-compose.ragflow.yaml up -d
#
# Services:
#   - ragflow:       RAGFlow (API + Web UI + task executor) via entrypoint.sh
#   - ragflow-es:    Elasticsearch (port 9200)
#   - ragflow-mysql: MySQL (port 3306)
#   - ragflow-redis: Redis (port 6379)
#   - ragflow-minio: MinIO (ports 9000/9001)
#
# RAGFlow is monolithic by design — entrypoint.sh manages nginx (web UI),
# the API server, and task executors as a single process group. Splitting
# into separate containers is not supported upstream.

services:
  # ── RAGFlow (API + Web UI + Task Executor) ─────────────────────────────
  ragflow:
    image: ${RAGFLOW_IMAGE:-infiniflow/ragflow:latest}
    container_name: eai-flow-ragflow
    # Default entrypoint (no --disable-* flags): starts nginx + API + task executors
    environment:
      # Must match service_conf.yaml.template variable names:
      #   MYSQL_DBNAME (NOT MYSQL_DATABASE)
      #   ES_HOST / ES_USER / ELASTIC_PASSWORD (NOT ES_HOSTS/ES_USERNAME/ES_PASSWORD)
      #   MINIO_HOST (NOT MINIO_ENDPOINT)
      - MYSQL_HOST=ragflow-mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=${MYSQL_ROOT_PASSWORD:-ragflow123}
      - MYSQL_DBNAME=${MYSQL_DBNAME:-ragflow}
      - ES_HOST=ragflow-es
      - ES_USER=elastic
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-ragflow123}
      - REDIS_HOST=ragflow-redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-ragflow123}
      - MINIO_HOST=ragflow-minio
      - MINIO_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - ragflow-data:/ragflow
    ports:
      - "${RAGFLOW_PORT:-9380}:9380"      # API
      - "${RAGFLOW_WEB_PORT:-9381}:80"    # Web UI (internal nginx)
    depends_on:
      ragflow-mysql:
        condition: service_healthy
      ragflow-es:
        condition: service_healthy
      ragflow-redis:
        condition: service_healthy
      ragflow-minio:
        condition: service_healthy
    networks:
      - eai-flow-net
    restart: unless-stopped

  # ── Elasticsearch ──────────────────────────────────────────────────────
  ragflow-es:
    image: elasticsearch:8.11.3
    container_name: eai-flow-ragflow-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-ragflow123}
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - ragflow-es-data:/usr/share/elasticsearch/data
    ports:
      - "${ES_PORT:-9200}:9200"
    networks:
      - eai-flow-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u elastic:${ELASTIC_PASSWORD:-ragflow123} http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── MySQL ──────────────────────────────────────────────────────────────
  ragflow-mysql:
    image: mysql:8.0
    container_name: eai-flow-ragflow-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-ragflow123}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-ragflow}
    volumes:
      - ragflow-mysql-data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    networks:
      - eai-flow-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-ragflow123}"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  # ── Redis ──────────────────────────────────────────────────────────────
  ragflow-redis:
    image: redis:7-alpine
    container_name: eai-flow-ragflow-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-ragflow123}
    volumes:
      - ragflow-redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - eai-flow-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-ragflow123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO ──────────────────────────────────────────────────────────────
  ragflow-minio:
    image: minio/minio:latest
    container_name: eai-flow-ragflow-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - ragflow-minio-data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - eai-flow-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ragflow-data:
  ragflow-es-data:
  ragflow-mysql-data:
  ragflow-redis-data:
  ragflow-minio-data:

networks:
  eai-flow-net:
    external: true
    name: eai-docker_eai-flow-net
