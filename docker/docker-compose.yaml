# DeerFlow Production Environment
# Usage: make up
#
# Services:
#   - nginx:       Reverse proxy (port 4026, configurable via PORT env var)
#   - frontend:    Next.js production server
#   - gateway:     FastAPI Gateway API
#   - langgraph:   LangGraph production server (Dockerfile generated by langgraph dockerfile)
#   - provisioner: (optional) Sandbox provisioner for Kubernetes mode
#
# Key environment variables (set via environment/.env or scripts/deploy.sh):
#   DEER_FLOW_HOME                   — runtime data dir, default $REPO_ROOT/backend/.deer-flow
#   DEER_FLOW_CONFIG_PATH            — path to config.yaml
#   DEER_FLOW_EXTENSIONS_CONFIG_PATH — path to extensions_config.json
#   DEER_FLOW_DOCKER_SOCKET          — Docker socket path, default /var/run/docker.sock
#   DEER_FLOW_REPO_ROOT              — repo root (used for skills host path in DooD)
#   BETTER_AUTH_SECRET               — required for frontend auth/session security
#
# LangSmith tracing is disabled by default (LANGSMITH_TRACING=false).
# Set LANGSMITH_TRACING=true and LANGSMITH_API_KEY in .env to enable it.
#
# Access: http://localhost:${PORT:-4026}

services:
  # ── Reverse Proxy ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: deer-flow-nginx
    ports:
      - "${PORT:-4026}:4026"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf.template:ro
    environment:
      - GATEWAY_UPSTREAM=${GATEWAY_UPSTREAM:-gateway:4001}
      - LANGGRAPH_UPSTREAM=${LANGGRAPH_UPSTREAM:-langgraph:4024}
      - LANGGRAPH_REWRITE=${LANGGRAPH_REWRITE:-/}
    command: >
      sh -c "envsubst '$$GATEWAY_UPSTREAM $$LANGGRAPH_UPSTREAM $$LANGGRAPH_REWRITE'
      < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf
      && nginx -g 'daemon off;'"
    depends_on:
      - frontend
      - gateway
    networks:
      - deer-flow
      - procurement-net
      - asset-net
      - project-net
    restart: unless-stopped
  frontend:
    build:
      context: ../
      dockerfile: frontend/Dockerfile
      target: prod
      args:
        PNPM_STORE_PATH: ${PNPM_STORE_PATH:-/root/.local/share/pnpm/store}
        NPM_REGISTRY: ${NPM_REGISTRY:-}
    container_name: deer-flow-frontend
    environment:
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - DEER_FLOW_INTERNAL_GATEWAY_BASE_URL=http://gateway:4001
      - DEER_FLOW_INTERNAL_LANGGRAPH_BASE_URL=http://langgraph:4024
    env_file:
      - ../frontend/.env
    networks:
      - deer-flow
      - procurement-net
      - asset-net
      - project-net
    restart: unless-stopped

  # ── Gateway API ────────────────────────────────────────────────────────────
  gateway:
    build:
      context: ../
      dockerfile: backend/Dockerfile
      args:
        APT_MIRROR: ${APT_MIRROR:-}
        UV_IMAGE: ${UV_IMAGE:-ghcr.io/astral-sh/uv:0.7.20}
        UV_INDEX_URL: ${UV_INDEX_URL:-https://pypi.org/simple}
    container_name: deer-flow-gateway
    command: sh -c "cd backend && PYTHONPATH=. uv run uvicorn app.gateway.app:app --host 0.0.0.0 --port 4001 --workers ${GATEWAY_WORKERS:-4}"
    volumes:
      - ${DEER_FLOW_CONFIG_PATH}:/app/backend/config.yaml:ro
      - ${DEER_FLOW_EXTENSIONS_CONFIG_PATH}:/app/backend/extensions_config.json:ro
      - ../skills:/app/skills:ro
      - ${DEER_FLOW_HOME}:/app/backend/.deer-flow
      # DooD: AioSandboxProvider starts sandbox containers via host Docker daemon
      - ${DEER_FLOW_DOCKER_SOCKET}:/var/run/docker.sock
      # CLI auth directories for auto-auth (Claude Code + Codex CLI)
      - type: bind
        source: ${HOME:?HOME must be set}/.claude
        target: /root/.claude
        read_only: true
        bind:
          create_host_path: true
      - type: bind
        source: ${HOME:?HOME must be set}/.codex
        target: /root/.codex
        read_only: true
        bind:
          create_host_path: true
    working_dir: /app
    environment:
      - CI=true
      - DEER_FLOW_HOME=/app/backend/.deer-flow
      - DEER_FLOW_CONFIG_PATH=/app/backend/config.yaml
      - DEER_FLOW_EXTENSIONS_CONFIG_PATH=/app/backend/extensions_config.json
      - DEER_FLOW_CHANNELS_LANGGRAPH_URL=${DEER_FLOW_CHANNELS_LANGGRAPH_URL:-http://langgraph:4024}
      - DEER_FLOW_CHANNELS_GATEWAY_URL=${DEER_FLOW_CHANNELS_GATEWAY_URL:-http://gateway:4001}
      # DooD path/network translation
      - DEER_FLOW_HOST_BASE_DIR=${DEER_FLOW_HOME}
      - DEER_FLOW_HOST_SKILLS_PATH=${DEER_FLOW_REPO_ROOT}/skills
      - DEER_FLOW_SANDBOX_HOST=host.docker.internal
    env_file:
      - ../.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - deer-flow
      - procurement-net
      - asset-net
      - project-net
    restart: unless-stopped

  # ── LangGraph Server ───────────────────────────────────────────────────────
  # TODO: switch to langchain/langgraph-api (licensed) once a license key is available.
  # For now, use `langgraph dev` (no license required) with the standard backend image.
  langgraph:
    build:
      context: ../
      dockerfile: backend/Dockerfile
      args:
        APT_MIRROR: ${APT_MIRROR:-}
        UV_IMAGE: ${UV_IMAGE:-ghcr.io/astral-sh/uv:0.7.20}
        UV_INDEX_URL: ${UV_INDEX_URL:-https://pypi.org/simple}
    container_name: deer-flow-langgraph
    command: sh -c 'cd /app/backend && args="--no-browser --no-reload --host 0.0.0.0 --port 4024 --n-jobs-per-worker $${LANGGRAPH_JOBS_PER_WORKER:-10}" && if [ "$${LANGGRAPH_ALLOW_BLOCKING:-0}" = "1" ]; then args="$$args --allow-blocking"; fi && uv run langgraph dev $$args'
    volumes:
      - ${DEER_FLOW_CONFIG_PATH}:/app/backend/config.yaml:ro
      - ${DEER_FLOW_EXTENSIONS_CONFIG_PATH}:/app/backend/extensions_config.json:ro
      - ${DEER_FLOW_HOME}:/app/backend/.deer-flow
      - ../skills:/app/skills:ro
      - ../backend/.langgraph_api:/app/backend/.langgraph_api
      # DooD: same as gateway
      - ${DEER_FLOW_DOCKER_SOCKET}:/var/run/docker.sock
      # CLI auth directories for auto-auth (Claude Code + Codex CLI)
      - type: bind
        source: ${HOME:?HOME must be set}/.claude
        target: /root/.claude
        read_only: true
        bind:
          create_host_path: true
      - type: bind
        source: ${HOME:?HOME must be set}/.codex
        target: /root/.codex
        read_only: true
        bind:
          create_host_path: true
    environment:
      - CI=true
      - DEER_FLOW_HOME=/app/backend/.deer-flow
      - DEER_FLOW_CONFIG_PATH=/app/backend/config.yaml
      - DEER_FLOW_EXTENSIONS_CONFIG_PATH=/app/backend/extensions_config.json
      - DEER_FLOW_HOST_BASE_DIR=${DEER_FLOW_HOME}
      - DEER_FLOW_HOST_SKILLS_PATH=${DEER_FLOW_REPO_ROOT}/skills
      - DEER_FLOW_SANDBOX_HOST=host.docker.internal
      # LangSmith tracing: set LANGSMITH_TRACING=true and LANGSMITH_API_KEY in .env to enable.
    env_file:
      - ../.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - deer-flow
    restart: unless-stopped

  # ── Sandbox Provisioner (optional, Kubernetes mode) ────────────────────────
  provisioner:
    build:
      context: ./provisioner
      dockerfile: Dockerfile
      args:
        APT_MIRROR: ${APT_MIRROR:-}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
    container_name: deer-flow-provisioner
    volumes:
      - ~/.kube/config:/root/.kube/config:ro
    environment:
      - K8S_NAMESPACE=deer-flow
      - SANDBOX_IMAGE=enterprise-public-cn-beijing.cr.volces.com/vefaas-public/all-in-one-sandbox:latest
      - SKILLS_HOST_PATH=${DEER_FLOW_REPO_ROOT}/skills
      - THREADS_HOST_PATH=${DEER_FLOW_HOME}/threads
      - KUBECONFIG_PATH=/root/.kube/config
      - NODE_HOST=host.docker.internal
      - K8S_API_SERVER=https://host.docker.internal:26443
    env_file:
      - ../.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - deer-flow
      - procurement-net
      - asset-net
      - project-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 6

  # ── Procurement Microservice Backend ──────────────────────────────────────────
  procurement-backend:
    build:
      context: ../business/procurement-service/backend
      dockerfile: Dockerfile
    container_name: procurement-backend
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 3001 --workers 2
    environment:
      - DATABASE_URL=${PROCUREMENT_DATABASE_URL:-postgresql+asyncpg://procurement:procurement@procurement-db:5432/procurement}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - API_PREFIX=/api/v1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    env_file:
      - ../.env
    networks:
      - deer-flow
      - procurement-net
    restart: unless-stopped
    depends_on:
      - procurement-db

  # ── Procurement Microservice Frontend ─────────────────────────────────────────
  procurement-frontend:
    build:
      context: ../business/procurement-service/frontend-shadcn
      dockerfile: Dockerfile
    container_name: procurement-frontend
    environment:
      - NODE_ENV=production
      - VITE_API_BASE_URL=http://localhost:2026/procurement
    networks:
      - deer-flow
      - procurement-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Procurement PostgreSQL Database ───────────────────────────────────────────
  procurement-db:
    image: postgres:16-alpine
    container_name: procurement-db
    environment:
      - POSTGRES_USER=procurement
      - POSTGRES_PASSWORD=${PROCUREMENT_DB_PASSWORD:-procurement}
      - POSTGRES_DB=procurement
    volumes:
      - procurement-db-data:/var/lib/postgresql/data
    networks:
      - procurement-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U procurement -d procurement"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Asset Microservice Backend ─────────────────────────────────────────────
  asset-backend:
    build:
      context: ../business/asset-service/backend
      dockerfile: Dockerfile
    container_name: asset-backend
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 3002 --workers 2
    environment:
      - DATABASE_URL=${ASSET_DATABASE_URL:-postgresql+asyncpg://asset:asset@asset-db:5432/asset}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - API_PREFIX=/api/v1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    env_file:
      - ../.env
    networks:
      - deer-flow
      - asset-net
    restart: unless-stopped
    depends_on:
      - asset-db

  # ── Asset Microservice Frontend ────────────────────────────────────────────
  asset-frontend:
    build:
      context: ../business/asset-service/frontend
      dockerfile: Dockerfile
    container_name: asset-frontend
    environment:
      - NEXT_PUBLIC_API_BASE_URL=
      - NEXT_PUBLIC_APP_BASE_URL=
    networks:
      - deer-flow
      - asset-net
    restart: unless-stopped

  # ── Asset PostgreSQL Database ────────────────────────────────────────────────
  asset-db:
    image: postgres:16-alpine
    container_name: asset-db
    environment:
      - POSTGRES_USER=asset
      - POSTGRES_PASSWORD=${ASSET_DB_PASSWORD:-asset}
      - POSTGRES_DB=asset
    volumes:
      - asset-db-data:/var/lib/postgresql/data
    networks:
      - asset-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asset -d asset"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Project Microservice Backend ────────────────────────────────────────────
  project-backend:
    build:
      context: ../business/project-service/backend
      dockerfile: Dockerfile
    container_name: project-backend
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 3003 --workers 2
    environment:
      - DATABASE_URL=${PROJECT_DATABASE_URL:-postgresql+asyncpg://project:project@project-db:5432/project}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - API_PREFIX=/api/v1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    env_file:
      - ../.env
    networks:
      - deer-flow
      - project-net
    restart: unless-stopped
    depends_on:
      - project-db

  # ── Project Microservice Frontend ──────────────────────────────────────────
  project-frontend:
    build:
      context: ../business/project-service/frontend
      dockerfile: Dockerfile
    container_name: project-frontend
    environment:
      - NEXT_PUBLIC_API_BASE_URL=
      - NEXT_PUBLIC_APP_BASE_URL=
    networks:
      - deer-flow
      - project-net
    restart: unless-stopped

  # ── Project PostgreSQL Database ─────────────────────────────────────────────
  project-db:
    image: postgres:16-alpine
    container_name: project-db
    environment:
      - POSTGRES_USER=project
      - POSTGRES_PASSWORD=${PROJECT_DB_PASSWORD:-project}
      - POSTGRES_DB=project
    volumes:
      - project-db-data:/var/lib/postgresql/data
    networks:
      - project-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U project -d project"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  procurement-db-data:
  asset-db-data:
  project-db-data:

networks:
  deer-flow:
    driver: bridge

  procurement-net:
    driver: bridge

  asset-net:
    driver: bridge

  project-net:
    driver: bridge
