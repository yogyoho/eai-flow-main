# DeerFlow Development Environment
# Usage: docker-compose -f docker-compose-dev.yaml up --build
#
# Services:
#   - nginx: Reverse proxy (port 2026)
#   - frontend: Frontend Next.js dev server (port 3000)
#   - gateway: Backend Gateway API (port 8001)
#   - langgraph: LangGraph server (port 2024)
#   - procurement-frontend: Procurement frontend (port 3000)
#   - procurement-backend: Procurement backend API (port 3001)
#   - provisioner (optional): Sandbox provisioner (creates Pods in host Kubernetes)
#
# Prerequisites:
#   - Kubernetes cluster + kubeconfig are only required when using provisioner mode.
#
# Access: http://localhost:2026
name: eai-docker

services:
  # ── Sandbox Provisioner ────────────────────────────────────────────────
  # Manages per-sandbox Pod + Service lifecycle in the host Kubernetes
  # cluster via the K8s API.
  # Backend accesses sandboxes directly via host.docker.internal:{NodePort}.
  # NOTE: Requires Kubernetes cluster with kubeconfig. Uncomment to enable.
  # provisioner:
  #   build:
  #     context: ./provisioner
  #     dockerfile: Dockerfile
  #     args:
  #       APT_MIRROR: ${APT_MIRROR:-}
  #   container_name: eai-flow-provisioner
  #   volumes:
  #     - ${HOME:-${USERPROFILE:-C:/Users/admin}}/.kube/config:/root/.kube/config:ro
  #   environment:
  #     - K8S_NAMESPACE=eai-flow
  #     - SANDBOX_IMAGE=enterprise-public-cn-beijing.cr.volces.com/vefaas-public/all-in-one-sandbox:latest
  #     - SKILLS_HOST_PATH=${DEER_FLOW_ROOT:-D:/eai/eai-flow-main}/skills
  #     - THREADS_HOST_PATH=${DEER_FLOW_ROOT:-D:/eai/eai-flow-main}/backend/.eai-flow/threads
  #     - KUBECONFIG_PATH=/root/.kube/config
  #     - NODE_HOST=host.docker.internal
  #     - K8S_API_SERVER=https://host.docker.internal:26443
  #   env_file:
  #     - ../.env
  #   extra_hosts:
  #     - "host.docker.internal:host-gateway"
  #   networks:
  #     - eai-flow-dev
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 6
  #     start_period: 15s

  # ── Procurement Microservice ─────────────────────────────────────────────
  # Uses external eai-flow-postgres-ext database service
  procurement-backend:
    build:
      context: ../business/procurement-service/backend
      dockerfile: Dockerfile
    container_name: procurement-backend
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=${PROCUREMENT_DATABASE_URL:-postgresql+asyncpg://agentflow:agentflow123@eai-flow-postgres-ext:5432/procurement}
      - PYTHONUNBUFFERED=1
    command: sh -c "uv sync && uv run uvicorn app.main:app --host 0.0.0.0 --port 3001 --reload --reload-dir /app/app"
    volumes:
      - ../business/procurement-service/backend:/app
      - procurement-backend-venv:/app/.venv
    networks:
      - eai-flow-dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  procurement-frontend:
    build:
      context: ../business/procurement-service/frontend-shadcn
      dockerfile: Dockerfile
      target: builder
    container_name: procurement-frontend
    command: sh -c "pnpm dev --host 0.0.0.0 --port 3000"
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=development
      - VITE_API_BASE_URL=http://localhost:2026/procurement
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - CI=true
    volumes:
      - ../business/procurement-service/frontend-shadcn:/app
      - procurement-frontend-node_modules:/app/node_modules
    networks:
      - eai-flow-dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/procurement/', { redirect: 'manual' }).then((r) => process.exit(r.status < 500 ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s

  # ── Reverse Proxy ──────────────────────────────────────────────────────
  # Routes API traffic to gateway/langgraph and (optionally) provisioner.
  # LANGGRAPH_UPSTREAM and LANGGRAPH_REWRITE control gateway vs standard
  # routing (processed by envsubst at container start).
  nginx:
    image: nginx:alpine
    container_name: eai-flow-nginx
    ports:
      - "2026:2026"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf.template:ro
    environment:
      - GATEWAY_UPSTREAM=${GATEWAY_UPSTREAM:-gateway:8001}
      - LANGGRAPH_UPSTREAM=${LANGGRAPH_UPSTREAM:-langgraph:2024}
      - LANGGRAPH_REWRITE=${LANGGRAPH_REWRITE:-/}
    command:
      - sh
      - -c
      - |
        set -e
        envsubst '$$GATEWAY_UPSTREAM $$LANGGRAPH_UPSTREAM $$LANGGRAPH_REWRITE' \
          < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf
        test -e /proc/net/if_inet6 || sed -i '/^[[:space:]]*listen[[:space:]]\+\[::\]:2026;/d' /etc/nginx/nginx.conf
        exec nginx -g 'daemon off;'
    depends_on:
      - frontend
      - gateway
      - procurement-frontend
      - procurement-backend
    networks:
      - eai-flow-dev
    restart: unless-stopped

  # Frontend - Next.js Development Server
  frontend:
    build:
      context: ../
      dockerfile: frontend/Dockerfile
      target: dev
      args:
        PNPM_STORE_PATH: ${PNPM_STORE_PATH:-/root/.local/share/pnpm/store}
        NPM_REGISTRY: ${NPM_REGISTRY:-}
    container_name: eai-flow-frontend
    command: sh -c "cd frontend && pnpm run dev > /app/logs/frontend.log 2>&1"
    volumes:
      - ../frontend/src:/app/frontend/src
      - ../frontend/public:/app/frontend/public
      - ../frontend/next.config.js:/app/frontend/next.config.js:ro
      - ../logs:/app/logs
      # Mount pnpm store for caching
      - ${PNPM_STORE_PATH:-~/.local/share/pnpm/store}:/root/.local/share/pnpm/store
    working_dir: /app
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - CI=true
      - PORT=3000
      - DEER_FLOW_INTERNAL_GATEWAY_BASE_URL=http://gateway:8001
      - DEER_FLOW_INTERNAL_LANGGRAPH_BASE_URL=http://langgraph:2024
    env_file:
      - ../frontend/.env
    networks:
      - eai-flow-dev
    restart: unless-stopped

  # Backend - Gateway API
  gateway:
    build:
      context: ../
      dockerfile: backend/Dockerfile
      target: dev
      # cache_from disabled - requires manual setup: mkdir -p /tmp/docker-cache-gateway
      args:
        APT_MIRROR: ${APT_MIRROR:-}
        UV_IMAGE: ${UV_IMAGE:-ghcr.io/astral-sh/uv:0.7.20}
        UV_INDEX_URL: ${UV_INDEX_URL:-https://pypi.org/simple}
        UV_HTTP_TIMEOUT: ${UV_HTTP_TIMEOUT:-600}
    container_name: eai-flow-gateway
    command: sh -c "{ cd backend && (uv sync || (echo '[startup] uv sync failed; recreating .venv and retrying once' && uv venv --allow-existing .venv && uv sync)) && PYTHONPATH=. uv run uvicorn app.gateway.app:app --host 0.0.0.0 --port 8001 --reload --reload-dir /app/backend --reload-include '*.py' --reload-include '*.yaml' --reload-include '*.json' --reload-include '.env'; } > /app/logs/gateway.log 2>&1"
    volumes:
      - ../backend/:/app/backend/
      # Preserve the .venv built during Docker image build — mounting the full backend/
      # directory above would otherwise shadow it with the (empty) host directory.
      - gateway-venv:/app/backend/.venv
      - ../config.yaml:/app/config.yaml
      - ../extensions_config.json:/app/extensions_config.json
      - ../skills:/app/skills
      - ../logs:/app/logs
      # Use a Docker-managed uv cache volume instead of a host bind mount.
      # On macOS/Docker Desktop, uv may fail to create symlinks inside shared
      # host directories, which causes startup-time `uv sync` to crash.
      - gateway-uv-cache:/root/.cache/uv
      # DooD: same as gateway — AioSandboxProvider runs inside LangGraph process.
      - /var/run/docker.sock:/var/run/docker.sock
      # CLI auth directories for auto-auth (Claude Code + Codex CLI)
      - type: bind
        source: ${HOME:-${USERPROFILE:-C:/Users/admin}}/.claude
        target: /root/.claude
        read_only: true
        bind:
          create_host_path: true
      - type: bind
        source: ${HOME:-${USERPROFILE:-C:/Users/admin}}/.codex
        target: /root/.codex
        read_only: true
        bind:
          create_host_path: true
    working_dir: /app
    environment:
      - CI=true
      # In the dev compose stack, routing the extensions DB through the host-mapped
      # port avoids the intermittent in-container postgres-ext connection failures
      # observed in the running uvicorn process.
      - EXTENSIONS_DB_HOST=host.docker.internal
      - EXTENSIONS_DB_PORT=5434
      - DEER_FLOW_HOME=/app/backend/.eai-flow
      - DEER_FLOW_CHANNELS_LANGGRAPH_URL=${DEER_FLOW_CHANNELS_LANGGRAPH_URL:-http://langgraph:2024}
      - DEER_FLOW_CHANNELS_GATEWAY_URL=${DEER_FLOW_CHANNELS_GATEWAY_URL:-http://gateway:8001}
      - DEER_FLOW_HOST_BASE_DIR=${DEER_FLOW_ROOT:-D:/eai/eai-flow-main}/backend/.eai-flow
      - DEER_FLOW_HOST_SKILLS_PATH=${DEER_FLOW_ROOT:-D:/eai/eai-flow-main}/skills
      - DEER_FLOW_SANDBOX_HOST=host.docker.internal
    env_file:
      - ../.env
    extra_hosts:
      # For Linux: map host.docker.internal to host gateway
      - "host.docker.internal:host-gateway"
    networks:
      - eai-flow-dev
    restart: unless-stopped

  # Backend - LangGraph Server
  langgraph:
    build:
      context: ../
      dockerfile: backend/Dockerfile
      target: dev
      # cache_from disabled - requires manual setup: mkdir -p /tmp/docker-cache-langgraph
      args:
        APT_MIRROR: ${APT_MIRROR:-}
        UV_IMAGE: ${UV_IMAGE:-ghcr.io/astral-sh/uv:0.7.20}
        UV_INDEX_URL: ${UV_INDEX_URL:-https://pypi.org/simple}
        UV_HTTP_TIMEOUT: ${UV_HTTP_TIMEOUT:-600}
    container_name: eai-flow-langgraph
    command: sh -c "cd backend && { (uv sync || (echo '[startup] uv sync failed; recreating .venv and retrying once' && uv venv --allow-existing .venv && uv sync)) && allow_blocking='' && if [ \"\${LANGGRAPH_ALLOW_BLOCKING:-0}\" = '1' ]; then allow_blocking='--allow-blocking'; fi && uv run langgraph dev --no-browser \${allow_blocking} --host 0.0.0.0 --port 2024 --n-jobs-per-worker \${LANGGRAPH_JOBS_PER_WORKER:-10}; } > /app/logs/langgraph.log 2>&1"
    volumes:
      - ../backend/:/app/backend/
      # Preserve the .venv built during Docker image build — mounting the full backend/
      # directory above would otherwise shadow it with the (empty) host directory.
      - langgraph-venv:/app/backend/.venv
      - ../config.yaml:/app/config.yaml
      - ../extensions_config.json:/app/extensions_config.json
      - ../skills:/app/skills
      - ../logs:/app/logs
      # Use a Docker-managed uv cache volume instead of a host bind mount.
      # On macOS/Docker Desktop, uv may fail to create symlinks inside shared
      # host directories, which causes startup-time `uv sync` to crash.
      - langgraph-uv-cache:/root/.cache/uv
      # DooD: same as gateway — AioSandboxProvider runs inside LangGraph process.
      - /var/run/docker.sock:/var/run/docker.sock
      # CLI auth directories for auto-auth (Claude Code + Codex CLI)
      - type: bind
        source: ${HOME:-${USERPROFILE:-C:/Users/admin}}/.claude
        target: /root/.claude
        read_only: true
        bind:
          create_host_path: true
      - type: bind
        source: ${HOME:-${USERPROFILE:-C:/Users/admin}}/.codex
        target: /root/.codex
        read_only: true
        bind:
          create_host_path: true
    working_dir: /app
    environment:
      - CI=true
      - DEER_FLOW_HOME=/app/backend/.eai-flow
      - DEER_FLOW_HOST_BASE_DIR=${DEER_FLOW_ROOT:-D:/eai/eai-flow-main}/backend/.eai-flow
      - DEER_FLOW_HOST_SKILLS_PATH=${DEER_FLOW_ROOT:-D:/eai/eai-flow-main}/skills
      - DEER_FLOW_SANDBOX_HOST=host.docker.internal
    env_file:
      - ../.env
    extra_hosts:
      # For Linux: map host.docker.internal to host gateway
      - "host.docker.internal:host-gateway"
    networks:
      - eai-flow-dev
    restart: unless-stopped

  postgres-ext:
    image: postgres:16
    container_name: eai-flow-postgres-ext
    environment:
      - POSTGRES_DB=agentflow
      - POSTGRES_USER=agentflow
      - POSTGRES_PASSWORD=agentflow123
    volumes:
      - postgres_ext_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - eai-flow-dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentflow -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── RAGFlow Service (Optional) ─────────────────────────────────────────────
  ragflow:
    profiles:
      - ragflow
    image: infiniflow/ragflow:v0.24.0
    container_name: eai-flow-ragflow
    ports:
      - "9380:9380"
      - "9381:80"
    environment:
      - RAGFLOW_API_KEY=${RAGFLOW_API_KEY:-}
      - MINIO_ENDPOINT=ragflow-minio:9000
      - MINIO_USER=rag_flow
      - MINIO_PASSWORD=infini_rag_flow
      - ES_URL=http://eai-flow-ragflow-es:9200
      - MYSQL_HOST=ragflow-mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=ragflow
      - MYSQL_DATABASE=rag_flow
      - REDIS_HOST=ragflow-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=ragflow
    volumes:
      - ragflow_data:/ragflow/data
      - ./ragflow/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - eai-flow-dev
    restart: unless-stopped
    depends_on:
      - ragflow-minio
      - ragflow-redis
      - ragflow-mysql
      - eai-flow-ragflow-es

  ragflow-mysql:
    profiles:
      - ragflow
    image: mysql:8.0
    container_name: eai-flow-ragflow-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=ragflow
      - MYSQL_DATABASE=rag_flow
      - MYSQL_USER=ragflow
      - MYSQL_PASSWORD=ragflow
    volumes:
      - ragflow_mysql_data:/var/lib/mysql
    networks:
      - eai-flow-dev
    restart: unless-stopped

  ragflow-redis:
    profiles:
      - ragflow
    image: redis:7
    container_name: eai-flow-ragflow-redis
    command: redis-server --requirepass ragflow
    networks:
      - eai-flow-dev
    restart: unless-stopped

  ragflow-minio:
    profiles:
      - ragflow
    image: minio/minio:latest
    container_name: eai-flow-ragflow-minio
    environment:
      - MINIO_ROOT_USER=rag_flow
      - MINIO_ROOT_PASSWORD=infini_rag_flow
    command: server /data --console-address ":9001"
    volumes:
      - ragflow_minio_data:/data
    networks:
      eai-flow-dev:
        aliases:
          - minio
    restart: unless-stopped

  # Elasticsearch for RAGFlow
  eai-flow-ragflow-es:
    profiles:
      - ragflow
    image: elasticsearch:8.11.0
    container_name: eai-flow-ragflow-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - ELASTIC_PASSWORD=ragflow
    volumes:
      - ragflow_es_data:/usr/share/elasticsearch/data
    networks:
      eai-flow-dev:
        aliases:
          - es01
    restart: unless-stopped

volumes:
  # Persist .venv across container restarts so dependencies installed during
  # image build are not shadowed by the host backend/ directory mount.
  gateway-venv:
  langgraph-venv:
  procurement-backend-venv:
  gateway-uv-cache:
  langgraph-uv-cache:
  procurement-frontend-node_modules:
  postgres_ext_data:
  ragflow_data:
  ragflow_mysql_data:
  ragflow_minio_data:
  ragflow_es_data:

networks:
  eai-flow-dev:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.200.0/24
  # eai-docker_eai-flow-dev:
    # external: true
 
 
 
